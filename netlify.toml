[build]
  command = "npm install --prefix backend && npm install --prefix frontend && npm run build --prefix frontend"
  publish = "frontend/build"

[build.environment]
  NODE_VERSION = "20"
  NPM_CONFIG_PRODUCTION = "false"

[functions]
  directory = "backend/functions"
  node_bundler = "nft"
  external_node_modules = [
    "express",
    "cors",
    "dotenv",
    "serverless-http",
    "@supabase/supabase-js",
    "ollama"
  ]

[functions.api]
  timeout = 10

[dev]
  command = "npm start --prefix frontend"
  targetPort = 3000
  port = 8888
  autoLaunch = false

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
